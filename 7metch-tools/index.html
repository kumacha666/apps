<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ナナメッチ ステージ分析ツール</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --card: #0f3460;
      --accent: #e94560;
      --accent2: #5c7cfa;
      --text: #eee;
      --text2: #aab;
      --border: #2a2a4a;
      --easy: #4caf50;
      --normal: #8bc34a;
      --hard: #ff9800;
      --vhard: #f44336;
      --extreme: #9c27b0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Segoe UI", "Hiragino Sans", "Meiryo", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 16px;
      max-width: 1400px;
      margin: 0 auto;
    }
    h1 { text-align: center; font-size: 1.4em; margin-bottom: 16px; color: var(--accent); }
    h2 { font-size: 1.1em; margin: 20px 0 10px; padding-bottom: 4px; border-bottom: 1px solid var(--border); color: var(--accent); }

    .main-layout { display: flex; gap: 16px; align-items: flex-start; }
    .main-content { flex: 1; min-width: 0; }

    /* パラメータパネル */
    .param-panel {
      width: 320px;
      flex-shrink: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      max-height: calc(100vh - 80px);
      overflow-y: auto;
      position: sticky;
      top: 16px;
    }
    .param-panel h2 { margin-top: 0; font-size: 1em; border: none; padding: 0; }
    .param-section {
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .param-section:last-child { border-bottom: none; margin-bottom: 0; }
    .param-section h3 {
      font-size: 0.85em;
      color: var(--accent2);
      margin-bottom: 8px;
    }
    .param-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 5px 0;
      font-size: 0.82em;
    }
    .param-row label { color: var(--text2); flex-shrink: 0; margin-right: 8px; }
    .param-row input[type="number"] {
      width: 60px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 6px;
      text-align: right;
    }
    .param-row input[type="range"] {
      flex: 1;
      margin: 0 8px;
      accent-color: var(--accent);
    }
    .param-row .range-val {
      width: 35px;
      text-align: right;
      font-size: 0.9em;
      color: var(--text);
    }
    .param-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .btn-param {
      flex: 1;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.82em;
      transition: all 0.15s;
    }
    .btn-apply { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-apply:hover { opacity: 0.85; }
    .btn-reset { background: var(--surface); color: var(--text2); }
    .btn-reset:hover { color: var(--text); border-color: var(--text2); }
    .btn-export { background: var(--card); color: var(--accent2); border-color: var(--accent2); }
    .btn-export:hover { opacity: 0.85; }
    .changed-indicator {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      margin-left: 6px;
      vertical-align: middle;
    }
    .param-diff {
      font-size: 0.75em;
      color: var(--accent);
      margin-left: 4px;
    }

    .tabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
    .tab {
      padding: 8px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px 8px 0 0;
      cursor: pointer;
      font-size: 0.9em;
      color: var(--text2);
      transition: all 0.15s;
    }
    .tab.active { background: var(--card); color: var(--text); border-bottom-color: var(--card); }
    .panel { display: none; }
    .panel.active { display: block; }

    .chart-container { background: var(--surface); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .chart-wrapper { height: 400px; position: relative; }

    table { width: 100%; border-collapse: collapse; font-size: 0.82em; background: var(--surface); border-radius: 8px; overflow: hidden; }
    th { background: var(--card); padding: 8px 6px; text-align: left; font-weight: 600; position: sticky; top: 0; white-space: nowrap; }
    td { padding: 6px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    tr:hover td { background: rgba(233,69,96,0.07); }
    .table-scroll { max-height: 500px; overflow-y: auto; border-radius: 8px; border: 1px solid var(--border); }

    .rank-easy { color: var(--easy); }
    .rank-normal { color: var(--normal); }
    .rank-hard { color: var(--hard); }
    .rank-vhard { color: var(--vhard); }
    .rank-extreme { color: var(--extreme); }

    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; margin-bottom: 16px; }
    .summary-card { background: var(--surface); border-radius: 8px; padding: 12px; border: 1px solid var(--border); }
    .summary-card h3 { font-size: 0.9em; color: var(--accent); margin-bottom: 8px; }

    .dist-bar { display: flex; align-items: center; margin: 4px 0; font-size: 0.85em; }
    .dist-label { width: 120px; flex-shrink: 0; }
    .dist-fill { height: 20px; border-radius: 4px; min-width: 2px; transition: width 0.3s; }
    .dist-count { margin-left: 8px; color: var(--text2); font-size: 0.85em; }

    .gate-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 0.85em; }
    .gate-label { width: 80px; font-weight: 600; }
    .gate-bar-bg { flex: 1; height: 16px; background: var(--border); border-radius: 8px; overflow: hidden; }
    .gate-bar-fill { height: 100%; border-radius: 8px; transition: width 0.3s; }
    .gate-pct { width: 45px; text-align: right; }
    .gate-detail { width: 140px; font-size: 0.8em; color: var(--text2); }

    .filter-row { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; font-size: 0.85em; }
    .filter-row label { color: var(--text2); }
    .filter-row select, .filter-row input {
      background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px;
    }

    .compare-legend {
      display: flex; gap: 16px; margin-bottom: 8px; font-size: 0.82em; align-items: center;
    }
    .compare-dot {
      display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; vertical-align: middle;
    }

    @media (max-width: 900px) {
      .main-layout { flex-direction: column; }
      .param-panel { width: 100%; position: static; max-height: none; }
      .chart-wrapper { height: 280px; }
      th, td { padding: 4px 3px; font-size: 0.75em; }
    }
  </style>
</head>
<body>
  <h1>ナナメッチ ステージ分析ツール</h1>

  <div class="main-layout">
    <!-- パラメータ調整パネル -->
    <div class="param-panel">
      <h2>パラメータ調整<span id="changed-dot" style="display:none" class="changed-indicator"></span></h2>

      <div class="param-section">
        <h3>基本設定</h3>
        <div class="param-row">
          <label>総ステージ数</label>
          <input type="number" id="p-total" value="350" min="10" max="1000" step="10">
        </div>
      </div>

      <div class="param-section">
        <h3>手数</h3>
        <div class="param-row">
          <label>初期手数 (Stage 1-10)</label>
          <input type="number" id="p-initMoves" value="20" min="8" max="30">
        </div>
        <div class="param-row">
          <label>手数下限</label>
          <input type="number" id="p-minMoves" value="12" min="8" max="25">
        </div>
        <div class="param-row">
          <label>10ステージ毎の減少</label>
          <input type="number" id="p-movesDecay" value="2" min="0" max="4" step="1">
        </div>
        <div class="param-row">
          <label>8列盤の手数下限</label>
          <input type="number" id="p-minMoves8" value="14" min="8" max="25">
        </div>
        <div class="param-row">
          <label>9列盤の手数下限</label>
          <input type="number" id="p-minMoves9" value="16" min="8" max="25">
        </div>
      </div>

      <div class="param-section">
        <h3>色数</h3>
        <div class="param-row">
          <label>初期色数</label>
          <input type="number" id="p-initColors" value="5" min="3" max="8">
        </div>
        <div class="param-row">
          <label>最大色数(通常)</label>
          <input type="number" id="p-maxColors" value="7" min="5" max="10">
        </div>
        <div class="param-row">
          <label>8色解放ステージ</label>
          <input type="number" id="p-color8Stage" value="200" min="1" max="1000">
        </div>
      </div>

      <div class="param-section">
        <h3>盤面サイズ切替</h3>
        <div class="param-row"><label>7×8 開始</label><input type="number" id="p-board78" value="10" min="1" max="500"></div>
        <div class="param-row"><label>8×9 開始</label><input type="number" id="p-board89" value="100" min="1" max="500"></div>
        <div class="param-row"><label>9×10 開始</label><input type="number" id="p-board910" value="250" min="1" max="500"></div>
      </div>

      <div class="param-section">
        <h3>ギミック解放ステージ</h3>
        <div class="param-row"><label>氷</label><input type="number" id="p-iceStage" value="100" min="1" max="1000"></div>
        <div class="param-row"><label>岩</label><input type="number" id="p-rockStage" value="150" min="1" max="1000"></div>
        <div class="param-row"><label>穴</label><input type="number" id="p-holeStage" value="250" min="1" max="1000"></div>
        <div class="param-row"><label>💣</label><input type="number" id="p-bombStage" value="300" min="1" max="1000"></div>
      </div>

      <div class="param-section">
        <h3>ミッション係数</h3>
        <div class="param-row">
          <label>消し: 上限ppm</label>
          <input type="number" id="p-clearMax" value="8" min="3" max="15" step="0.5">
        </div>
        <div class="param-row">
          <label>消し: 初期ppm</label>
          <input type="number" id="p-clearInit" value="3.0" min="1" max="8" step="0.1">
        </div>
        <div class="param-row">
          <label>消し: 上昇率</label>
          <input type="number" id="p-clearGrowth" value="0.04" min="0.01" max="0.1" step="0.005">
        </div>
        <div class="param-row">
          <label>スコア: 上限倍率</label>
          <input type="number" id="p-scoreMax" value="100" min="30" max="200" step="5">
        </div>
        <div class="param-row">
          <label>色: 上限倍率</label>
          <input type="number" id="p-colorMax" value="1.0" min="0.3" max="2.0" step="0.05">
        </div>
      </div>

      <div class="param-section">
        <h3>★判定</h3>
        <div class="param-row">
          <label>★2 手数率</label>
          <input type="number" id="p-star2rate" value="0.60" min="0.3" max="0.9" step="0.05">
        </div>
        <div class="param-row">
          <label>★3 手数率</label>
          <input type="number" id="p-star3rate" value="0.35" min="0.1" max="0.7" step="0.05">
        </div>
      </div>

      <div class="param-actions">
        <button class="btn-param btn-apply" id="btn-apply">適用</button>
        <button class="btn-param btn-reset" id="btn-reset">リセット</button>
      </div>
      <div class="param-actions">
        <button class="btn-param btn-export" id="btn-export">パラメータをコピー</button>
      </div>
    </div>

    <!-- メインコンテンツ -->
    <div class="main-content">
      <div class="tabs">
        <div class="tab active" data-tab="chart">難易度グラフ</div>
        <div class="tab" data-tab="summary">区間サマリ</div>
        <div class="tab" data-tab="gates">★ゲート分析</div>
        <div class="tab" data-tab="list">全ステージ一覧</div>
      </div>

      <div id="panel-chart" class="panel active">
        <div class="chart-container">
          <div class="filter-row">
            <label>表示範囲:</label>
            <input type="number" id="chart-from" value="1" min="1" style="width:60px">
            <span>〜</span>
            <input type="number" id="chart-to" value="350" min="1" style="width:60px">
            <label><input type="checkbox" id="show-moving-avg" checked> 移動平均(10)</label>
            <label><input type="checkbox" id="show-compare"> 変更前と比較</label>
          </div>
          <div id="compare-legend" class="compare-legend" style="display:none">
            <span><span class="compare-dot" style="background:#e94560"></span>変更後(移動平均)</span>
            <span><span class="compare-dot" style="background:#5c7cfa"></span>変更前(移動平均)</span>
          </div>
          <div class="chart-wrapper">
            <canvas id="difficultyChart"></canvas>
          </div>
        </div>
        <div class="summary-grid">
          <div class="summary-card">
            <h3>難易度分布</h3>
            <div id="dist-bars"></div>
          </div>
          <div class="summary-card">
            <h3>統計情報</h3>
            <div id="stats-info"></div>
          </div>
        </div>
      </div>

      <div id="panel-summary" class="panel">
        <div class="chart-container">
          <div class="chart-wrapper">
            <canvas id="summaryChart"></canvas>
          </div>
        </div>
        <div class="table-scroll" id="summary-table"></div>
      </div>

      <div id="panel-gates" class="panel">
        <h2>★ゲート通過率</h2>
        <div id="gate-bars"></div>
        <h2>★獲得シミュレーション</h2>
        <div class="summary-grid">
          <div class="summary-card">
            <h3>全ステージ★2想定</h3>
            <div id="sim-star2"></div>
          </div>
          <div class="summary-card">
            <h3>★1:50% ★2:30% ★3:20% 想定</h3>
            <div id="sim-mixed"></div>
          </div>
        </div>
      </div>

      <div id="panel-list" class="panel">
        <div class="filter-row">
          <label>範囲:</label>
          <input type="number" id="list-from" value="1" min="1" style="width:60px">
          <span>〜</span>
          <input type="number" id="list-to" value="350" min="1" style="width:60px">
          <label>ミッション:</label>
          <select id="list-mission">
            <option value="all">すべて</option>
            <option value="clear">消しミッション</option>
            <option value="score">スコアミッション</option>
            <option value="color">色ミッション</option>
          </select>
        </div>
        <div class="table-scroll" id="stage-table"></div>
      </div>
    </div>
  </div>

  <script>
    const PIECE_NAMES = ["まる","ダイヤ","しかく","さんかく","ほし","ヘキサ","クロス","オクタ"];
    const RANK_COLORS = { Easy: "#4caf50", Normal: "#8bc34a", Hard: "#ff9800", "Very Hard": "#f44336", Extreme: "#9c27b0" };
    const RANK_CLASS = { Easy: "rank-easy", Normal: "rank-normal", Hard: "rank-hard", "Very Hard": "rank-vhard", Extreme: "rank-extreme" };

    const STAR_GATES = [
      { stage: 25, stars: 30 }, { stage: 50, stars: 80 }, { stage: 75, stars: 140 },
      { stage: 100, stars: 190 }, { stage: 150, stars: 290 }, { stage: 200, stars: 390 },
      { stage: 250, stars: 490 }, { stage: 300, stars: 590 }, { stage: 350, stars: 690 },
    ];

    // === デフォルトパラメータ ===
    const DEFAULTS = {
      total: 350,
      initMoves: 20, minMoves: 12, movesDecay: 2, minMoves8: 14, minMoves9: 16,
      initColors: 5, maxColors: 7, color8Stage: 200,
      board78: 10, board89: 100, board910: 250,
      iceStage: 100, rockStage: 150, holeStage: 250, bombStage: 300,
      clearMax: 8, clearInit: 3.0, clearGrowth: 0.04, scoreMax: 100, colorMax: 1.0,
      star2rate: 0.60, star3rate: 0.35,
    };

    function getParams() {
      return {
        total: parseInt(document.getElementById("p-total").value),
        initMoves: parseInt(document.getElementById("p-initMoves").value),
        minMoves: parseInt(document.getElementById("p-minMoves").value),
        movesDecay: parseInt(document.getElementById("p-movesDecay").value),
        minMoves8: parseInt(document.getElementById("p-minMoves8").value),
        minMoves9: parseInt(document.getElementById("p-minMoves9").value),
        initColors: parseInt(document.getElementById("p-initColors").value),
        maxColors: parseInt(document.getElementById("p-maxColors").value),
        color8Stage: parseInt(document.getElementById("p-color8Stage").value),
        board78: parseInt(document.getElementById("p-board78").value),
        board89: parseInt(document.getElementById("p-board89").value),
        board910: parseInt(document.getElementById("p-board910").value),
        iceStage: parseInt(document.getElementById("p-iceStage").value),
        rockStage: parseInt(document.getElementById("p-rockStage").value),
        holeStage: parseInt(document.getElementById("p-holeStage").value),
        bombStage: parseInt(document.getElementById("p-bombStage").value),
        clearMax: parseFloat(document.getElementById("p-clearMax").value),
        clearInit: parseFloat(document.getElementById("p-clearInit").value),
        clearGrowth: parseFloat(document.getElementById("p-clearGrowth").value),
        scoreMax: parseFloat(document.getElementById("p-scoreMax").value),
        colorMax: parseFloat(document.getElementById("p-colorMax").value),
        star2rate: parseFloat(document.getElementById("p-star2rate").value),
        star3rate: parseFloat(document.getElementById("p-star3rate").value),
      };
    }

    function setParams(p) {
      for (const [k, v] of Object.entries(p)) {
        const el = document.getElementById("p-" + k);
        if (el) el.value = v;
      }
    }

    // === ステージ生成 ===
    function boardSizeForStage(i, p) {
      if (i < p.board78) return { cols: 6, rows: 7 };
      if (i < p.board89) return { cols: 7, rows: 8 };
      if (i < p.board910) return { cols: 8, rows: 9 };
      return { cols: 9, rows: 10 };
    }

    function buildStage(i, p) {
      const size = boardSizeForStage(i, p);
      const tier = Math.floor(i / 10);
      const baseMoves = Math.max(p.minMoves, p.initMoves - tier * p.movesDecay);
      let moves;
      if (i < p.board78) moves = p.initMoves;
      else if (size.cols >= 9) moves = Math.max(p.minMoves9, baseMoves);
      else if (size.cols >= 8) moves = Math.max(p.minMoves8, baseMoves);
      else moves = baseMoves;

      const baseColors = Math.min(p.maxColors, p.initColors + Math.floor(i / 10));
      const colors = (i >= p.color8Stage) ? 8 : baseColors;
      const star2rate = i < p.board78 ? 0.65 : p.star2rate;
      const star3rate = i < p.board78 ? 0.45 : p.star3rate;
      const area = size.cols * size.rows;

      const features = [];
      features.push("斜Line");
      if (i >= p.iceStage) features.push("氷");
      if (i >= p.rockStage) features.push("岩");
      if (i >= p.color8Stage) features.push("8色");
      if (i >= p.holeStage) features.push("穴");
      if (i >= p.bombStage) features.push("💣");

      let mission;
      if (i % 5 === 0 && i > 0) {
        const targetColor = i % colors;
        mission = { type: "color", colorIndex: targetColor, colorName: PIECE_NAMES[targetColor],
                    count: Math.floor(moves * Math.min(p.colorMax, 0.5 + i * 0.008)) };
      } else if (i % 3 === 0) {
        mission = { type: "score", target: Math.floor(moves * Math.min(p.scoreMax, 50 + i * 1.0)) };
      } else {
        mission = { type: "clear", count: Math.floor(moves * Math.min(p.clearMax, p.clearInit + i * p.clearGrowth)) };
      }

      const difficulty = calcDifficulty(i, moves, colors, size, area, mission, features);

      return {
        index: i, name: i + 1, moves, colors,
        cols: size.cols, rows: size.rows, area,
        mission, features,
        star2moves: Math.floor(moves * star2rate),
        star3moves: Math.floor(moves * star3rate),
        difficulty,
      };
    }

    function calcDifficulty(i, moves, colors, size, area, mission, features) {
      const matchDifficulty = colors / 5;
      let movesEfficiency;
      switch (mission.type) {
        case "clear": movesEfficiency = mission.count / moves / area * 10; break;
        case "score": movesEfficiency = mission.target / moves / 100; break;
        case "color": movesEfficiency = mission.count / moves / (area / colors) * 5; break;
      }
      const movesPressure = 20 / moves;
      let gimmickFactor = 1.0;
      if (features.includes("氷")) gimmickFactor += 0.15;
      if (features.includes("岩")) gimmickFactor += 0.2;
      if (features.includes("8色")) gimmickFactor += 0.15;
      if (features.includes("穴")) gimmickFactor += 0.2;
      if (features.includes("💣")) gimmickFactor += 0.25;
      if (features.includes("斜Line")) gimmickFactor -= 0.1;
      const raw = matchDifficulty * movesEfficiency * movesPressure * gimmickFactor;
      const score = Math.round(raw * 100) / 100;
      let rank;
      if (score < 1.0) rank = "Easy";
      else if (score < 1.6) rank = "Normal";
      else if (score < 2.4) rank = "Hard";
      else if (score < 3.2) rank = "Very Hard";
      else rank = "Extreme";
      return { score, rank, matchDifficulty: Math.round(matchDifficulty * 100) / 100,
               movesEfficiency: Math.round(movesEfficiency * 100) / 100,
               movesPressure: Math.round(movesPressure * 100) / 100,
               gimmickFactor: Math.round(gimmickFactor * 100) / 100 };
    }

    function buildAllStages(p) {
      const stages = [];
      for (let i = 0; i < p.total; i++) stages.push(buildStage(i, p));
      return stages;
    }

    // === State ===
    let baselineStages = buildAllStages(DEFAULTS);
    let currentStages = baselineStages;
    let currentParams = { ...DEFAULTS };

    function movingAvg(scores, window) {
      const ma = [];
      for (let i = 0; i < scores.length; i++) {
        if (i < window - 1) { ma.push(null); continue; }
        let sum = 0;
        for (let j = i - window + 1; j <= i; j++) sum += scores[j];
        ma.push(Math.round(sum / window * 100) / 100);
      }
      return ma;
    }

    // === タブ ===
    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
        tab.classList.add("active");
        document.getElementById("panel-" + tab.dataset.tab).classList.add("active");
      });
    });

    // === 難易度グラフ ===
    let diffChart = null;

    function renderDifficultyChart() {
      const total = currentParams.total;
      const from = Math.max(1, parseInt(document.getElementById("chart-from").value) || 1);
      const to = Math.min(total, parseInt(document.getElementById("chart-to").value) || total);
      const showMA = document.getElementById("show-moving-avg").checked;
      const showCompare = document.getElementById("show-compare").checked;
      const stages = currentStages.slice(from - 1, to);

      document.getElementById("compare-legend").style.display = showCompare ? "" : "none";

      const labels = stages.map(s => s.name);
      const scores = stages.map(s => s.difficulty.score);
      const bgColors = stages.map(s => RANK_COLORS[s.difficulty.rank] + "88");
      const borderColors = stages.map(s => RANK_COLORS[s.difficulty.rank]);

      const datasets = [{
        label: "難易度スコア", data: scores,
        backgroundColor: bgColors, borderColor: borderColors,
        borderWidth: 1, pointRadius: stages.length > 100 ? 1 : 3,
        pointHoverRadius: 5, type: "bar", order: 3,
      }];

      if (showMA && stages.length >= 10) {
        datasets.push({
          label: "移動平均(10)", data: movingAvg(scores, 10),
          borderColor: "#e94560", borderWidth: 2, pointRadius: 0,
          tension: 0.3, type: "line", order: 1,
        });
      }

      if (showCompare) {
        const bStages = baselineStages.slice(from - 1, Math.min(baselineStages.length, to));
        const bScores = bStages.map(s => s.difficulty.score);
        if (showMA && bStages.length >= 10) {
          const padded = [...movingAvg(bScores, 10)];
          while (padded.length < labels.length) padded.push(null);
          datasets.push({
            label: "変更前(移動平均)", data: padded,
            borderColor: "#5c7cfa", borderWidth: 2, borderDash: [6, 3],
            pointRadius: 0, tension: 0.3, type: "line", order: 2,
          });
        } else {
          const padded = [...bScores];
          while (padded.length < labels.length) padded.push(null);
          datasets.push({
            label: "変更前", data: padded,
            borderColor: "#5c7cfa55", borderWidth: 1,
            pointRadius: 0, type: "bar", order: 4,
          });
        }
      }

      const annotations = {};
      const featureUnlocks = [
        { stage: currentParams.iceStage + 1, label: "氷", color: "#64b5f6" },
        { stage: currentParams.rockStage + 1, label: "岩", color: "#90a4ae" },
        { stage: currentParams.color8Stage + 1, label: "8色", color: "#ce93d8" },
        { stage: currentParams.holeStage + 1, label: "穴", color: "#a1887f" },
        { stage: currentParams.bombStage + 1, label: "💣", color: "#ef5350" },
      ];
      featureUnlocks.forEach((f, idx) => {
        if (f.stage >= from && f.stage <= to) {
          annotations["feat" + idx] = {
            type: "line", xMin: f.stage - from, xMax: f.stage - from,
            borderColor: f.color, borderWidth: 2, borderDash: [4, 4],
            label: { content: f.label, display: true, position: "start",
                     backgroundColor: f.color + "cc", color: "#fff", font: { size: 11 } }
          };
        }
      });
      STAR_GATES.forEach((g, idx) => {
        if (g.stage >= from && g.stage <= to) {
          annotations["gate" + idx] = {
            type: "line", xMin: g.stage - from, xMax: g.stage - from,
            borderColor: "#ffd70066", borderWidth: 1, borderDash: [2, 2],
            label: { content: "★" + g.stars, display: true, position: "end",
                     backgroundColor: "#ffd700cc", color: "#000", font: { size: 9 } }
          };
        }
      });

      if (diffChart) diffChart.destroy();
      diffChart = new Chart(document.getElementById("difficultyChart"), {
        type: "bar",
        data: { labels, datasets },
        options: {
          responsive: true, maintainAspectRatio: false,
          interaction: { mode: "index", intersect: false },
          plugins: {
            legend: { labels: { color: "#eee" } },
            annotation: { annotations },
            tooltip: {
              callbacks: {
                afterBody(ctx) {
                  const i = ctx[0].dataIndex + from - 1;
                  if (i >= currentStages.length) return [];
                  const s = currentStages[i];
                  const m = s.mission;
                  let mStr;
                  switch (m.type) {
                    case "clear": mStr = `${m.count}個消し`; break;
                    case "score": mStr = `${m.target}点`; break;
                    case "color": mStr = `${m.colorName}${m.count}個`; break;
                  }
                  return [
                    `盤面: ${s.cols}×${s.rows}  色: ${s.colors}  手数: ${s.moves}`,
                    `ミッション: ${mStr}`,
                    `ランク: ${s.difficulty.rank}`,
                    `機能: ${s.features.join(", ")}`,
                  ];
                }
              }
            }
          },
          scales: {
            x: { ticks: { color: "#aab", maxTicksLimit: 30 }, grid: { color: "#2a2a4a" } },
            y: { ticks: { color: "#aab" }, grid: { color: "#2a2a4a" },
                 title: { display: true, text: "難易度スコア", color: "#aab" } }
          }
        }
      });

      renderDistribution(stages);
      renderStats(stages);
    }

    function renderDistribution(stages) {
      const buckets = { Easy: 0, Normal: 0, Hard: 0, "Very Hard": 0, Extreme: 0 };
      stages.forEach(s => buckets[s.difficulty.rank]++);
      const max = Math.max(...Object.values(buckets));
      let html = "";
      for (const [rank, count] of Object.entries(buckets)) {
        const pct = stages.length ? Math.round(count / stages.length * 100) : 0;
        const w = max ? Math.round(count / max * 100) : 0;
        html += `<div class="dist-bar">
          <span class="dist-label ${RANK_CLASS[rank]}">${rank}</span>
          <div class="dist-fill" style="width:${w}%;background:${RANK_COLORS[rank]}"></div>
          <span class="dist-count">${count} (${pct}%)</span>
        </div>`;
      }
      document.getElementById("dist-bars").innerHTML = html;
    }

    function renderStats(stages) {
      if (!stages.length) { document.getElementById("stats-info").innerHTML = ""; return; }
      const scores = stages.map(s => s.difficulty.score);
      const avg = scores.reduce((a, b) => a + b, 0) / scores.length;
      document.getElementById("stats-info").innerHTML = `
        <div style="font-size:0.85em;line-height:1.8">
          <div>ステージ数: <b>${stages.length}</b></div>
          <div>難易度 平均: <b>${avg.toFixed(2)}</b> / 最小: <b>${Math.min(...scores)}</b> / 最大: <b>${Math.max(...scores)}</b></div>
          <div>手数: <b>${Math.min(...stages.map(s => s.moves))}〜${Math.max(...stages.map(s => s.moves))}</b></div>
          <div>色数: <b>${Math.min(...stages.map(s => s.colors))}〜${Math.max(...stages.map(s => s.colors))}</b></div>
        </div>`;
    }

    document.getElementById("chart-from").addEventListener("change", renderDifficultyChart);
    document.getElementById("chart-to").addEventListener("change", renderDifficultyChart);
    document.getElementById("show-moving-avg").addEventListener("change", renderDifficultyChart);
    document.getElementById("show-compare").addEventListener("change", renderDifficultyChart);

    // === 区間サマリ ===
    let summaryChart = null;

    function buildRanges(total) {
      const ranges = [
        { label: "1-10", s: 0, e: 10 }, { label: "11-25", s: 10, e: 25 },
        { label: "26-50", s: 25, e: 50 }, { label: "51-75", s: 50, e: 75 },
        { label: "76-100", s: 75, e: 100 },
      ];
      for (let s = 100; s < total; s += 50) {
        const e = Math.min(s + 50, total);
        ranges.push({ label: `${s + 1}-${e}`, s, e });
      }
      return ranges;
    }

    function renderSummary() {
      const ranges = buildRanges(currentParams.total);
      const avgScores = [], maxScores = [], labels = [];
      let html = "<table><thead><tr><th>区間</th><th>盤面</th><th>色</th><th>手数</th>" +
                 "<th>難易度(平均)</th><th>難易度(最大)</th><th>ppm(平均)</th><th>機能</th></tr></thead><tbody>";

      for (const r of ranges) {
        const sl = currentStages.slice(r.s, r.e);
        if (!sl.length) continue;
        const avg = sl.reduce((s, st) => s + st.difficulty.score, 0) / sl.length;
        const mx = Math.max(...sl.map(s => s.difficulty.score));
        const minM = Math.min(...sl.map(s => s.moves));
        const maxM = Math.max(...sl.map(s => s.moves));
        const minC = Math.min(...sl.map(s => s.colors));
        const maxC = Math.max(...sl.map(s => s.colors));
        const clears = sl.filter(s => s.mission.type === "clear");
        const ppm = clears.length ? clears.reduce((s, st) => s + st.mission.count / st.moves, 0) / clears.length : 0;
        const feats = [...new Set(sl.flatMap(s => s.features))];
        avgScores.push(Math.round(avg * 100) / 100);
        maxScores.push(Math.round(mx * 100) / 100);
        labels.push(r.label);
        html += `<tr>
          <td>Stage ${r.label}</td><td>${sl[0].cols}×${sl[0].rows}</td>
          <td>${minC === maxC ? minC : minC + "-" + maxC}</td>
          <td>${minM === maxM ? minM : minM + "-" + maxM}</td>
          <td>${avg.toFixed(2)}</td><td>${mx.toFixed(2)}</td>
          <td>${ppm.toFixed(1)}/手</td><td>${feats.join(", ") || "-"}</td>
        </tr>`;
      }
      html += "</tbody></table>";
      document.getElementById("summary-table").innerHTML = html;

      if (summaryChart) summaryChart.destroy();
      summaryChart = new Chart(document.getElementById("summaryChart"), {
        type: "bar",
        data: {
          labels,
          datasets: [
            { label: "平均難易度", data: avgScores, backgroundColor: "#e9456088", borderColor: "#e94560", borderWidth: 1 },
            { label: "最大難易度", data: maxScores, backgroundColor: "#9c27b044", borderColor: "#9c27b0", borderWidth: 1 },
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { labels: { color: "#eee" } } },
          scales: {
            x: { ticks: { color: "#aab" }, grid: { color: "#2a2a4a" } },
            y: { ticks: { color: "#aab" }, grid: { color: "#2a2a4a" } }
          }
        }
      });
    }

    // === ★ゲート ===
    function renderGates() {
      const total = currentParams.total;
      let html = "";
      STAR_GATES.forEach(g => {
        if (g.stage > total) return;
        const maxStars = (g.stage - 1) * 3;
        const pct = Math.round(g.stars / maxStars * 100);
        const color = pct > 70 ? "#f44336" : pct > 60 ? "#ff9800" : "#4caf50";
        html += `<div class="gate-row">
          <span class="gate-label">Stage ${g.stage}</span>
          <div class="gate-bar-bg"><div class="gate-bar-fill" style="width:${pct}%;background:${color}"></div></div>
          <span class="gate-pct">${pct}%</span>
          <span class="gate-detail">★${g.stars} / 最大${maxStars}</span>
        </div>`;
      });
      document.getElementById("gate-bars").innerHTML = html;

      let sim2 = "", simM = "";
      STAR_GATES.forEach(g => {
        if (g.stage > total) return;
        const s2 = (g.stage - 1) * 2, d2 = s2 - g.stars;
        sim2 += `<div style="font-size:0.85em;padding:3px 0;color:${d2 >= 0 ? "#4caf50" : "#f44336"}">
          ${d2 >= 0 ? "✅" : "❌"} Stage ${g.stage}: ★${s2} / 必要★${g.stars} (${d2 >= 0 ? "+" : ""}${d2})</div>`;
        const sm = Math.floor((g.stage - 1) * 1.7), dm = sm - g.stars;
        simM += `<div style="font-size:0.85em;padding:3px 0;color:${dm >= 0 ? "#4caf50" : "#f44336"}">
          ${dm >= 0 ? "✅" : "❌"} Stage ${g.stage}: ★${sm} / 必要★${g.stars} (${dm >= 0 ? "+" : ""}${dm})</div>`;
      });
      document.getElementById("sim-star2").innerHTML = sim2;
      document.getElementById("sim-mixed").innerHTML = simM;
    }

    // === ステージ一覧 ===
    function renderStageList() {
      const total = currentParams.total;
      const from = Math.max(1, parseInt(document.getElementById("list-from").value) || 1);
      const to = Math.min(total, parseInt(document.getElementById("list-to").value) || total);
      const mFilter = document.getElementById("list-mission").value;
      let stages = currentStages.slice(from - 1, to);
      if (mFilter !== "all") stages = stages.filter(s => s.mission.type === mFilter);

      let html = "<table><thead><tr><th>Stage</th><th>盤面</th><th>色</th><th>手数</th>" +
                 "<th>ミッション</th><th>★2</th><th>★3</th><th>難易度</th><th>ランク</th><th>機能</th></tr></thead><tbody>";
      for (const s of stages) {
        const m = s.mission;
        let mStr;
        switch (m.type) {
          case "clear": mStr = `消 ${m.count}`; break;
          case "score": mStr = `点 ${m.target}`; break;
          case "color": mStr = `色 ${m.colorName}${m.count}`; break;
        }
        html += `<tr>
          <td>${s.name}</td><td>${s.cols}×${s.rows}</td><td>${s.colors}</td><td>${s.moves}</td>
          <td>${mStr}</td><td>${s.star2moves}</td><td>${s.star3moves}</td>
          <td>${s.difficulty.score}</td><td class="${RANK_CLASS[s.difficulty.rank]}">${s.difficulty.rank}</td>
          <td>${s.features.join(", ")}</td>
        </tr>`;
      }
      html += "</tbody></table>";
      document.getElementById("stage-table").innerHTML = html;
    }

    document.getElementById("list-from").addEventListener("change", renderStageList);
    document.getElementById("list-to").addEventListener("change", renderStageList);
    document.getElementById("list-mission").addEventListener("change", renderStageList);

    // === パラメータ適用 ===
    function applyParams() {
      currentParams = getParams();
      currentStages = buildAllStages(currentParams);

      document.getElementById("chart-to").value = currentParams.total;
      document.getElementById("list-to").value = currentParams.total;

      const changed = Object.keys(DEFAULTS).some(k => currentParams[k] !== DEFAULTS[k]);
      document.getElementById("changed-dot").style.display = changed ? "" : "none";

      renderAll();
    }

    function renderAll() {
      renderDifficultyChart();
      renderSummary();
      renderGates();
      renderStageList();
    }

    document.getElementById("btn-apply").addEventListener("click", applyParams);

    document.getElementById("btn-reset").addEventListener("click", () => {
      setParams(DEFAULTS);
      applyParams();
    });

    document.getElementById("btn-export").addEventListener("click", () => {
      const p = getParams();
      const changed = {};
      for (const [k, v] of Object.entries(p)) {
        if (v !== DEFAULTS[k]) changed[k] = v;
      }
      const text = Object.keys(changed).length
        ? "変更パラメータ:\n" + Object.entries(changed).map(([k, v]) => `  ${k}: ${DEFAULTS[k]} → ${v}`).join("\n")
        : "変更なし（デフォルト値）";
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById("btn-export");
        btn.textContent = "コピーしました!";
        setTimeout(() => btn.textContent = "パラメータをコピー", 1500);
      });
    });

    // === 初期表示 ===
    renderAll();
  </script>
</body>
</html>
