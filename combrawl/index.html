<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#10121a">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon-192.png">
<title>combrawl</title>






































































<script type="module" crossorigin src="./game.js"></script>

<link rel="stylesheet" crossorigin href="./style.css">
</head>
<body>

  <div class="title-screen" id="titleScreen">
    <div class="title-logo">combrawl</div>
    <div class="title-tagline">カード × オートバトラー・ローグライク</div>
    <div class="title-mode-row" id="titleModeRow"></div>
    <div class="title-gallery-btn">
      <button class="btn secondary" id="openGalleryBtn">🖼 ギャラリー</button>
    </div>
    <div class="title-credit">Honeypaw Lab. by kumacha.</div>
  </div>

  <div class="gallery-screen" id="galleryScreen" hidden>
    <div class="gallery-header">
      <button class="gallery-back" id="galleryBackBtn">← タイトルへ戻る</button>
    </div>
    <h1 class="gallery-title">ギャラリー</h1>
    <p class="gallery-note">これまでのランで到達したユニットの姿。まだ見ていない段階は<span class="q-mark">？</span>のまま――育てて解放していこう。</p>

    <div class="gallery-summary">
      <div class="summary-cell hp">
        <div class="summary-label">HP</div>
        <div class="summary-value" id="hpSummaryValue">0 / 12</div>
        <div class="summary-bar"><span id="hpSummaryBar"></span></div>
      </div>
      <div class="summary-cell atk">
        <div class="summary-label">ATK</div>
        <div class="summary-value" id="atkSummaryValue">0 / 12</div>
        <div class="summary-bar"><span id="atkSummaryBar"></span></div>
      </div>
      <div class="summary-cell def">
        <div class="summary-label">DEF</div>
        <div class="summary-value" id="defSummaryValue">0 / 12</div>
        <div class="summary-bar"><span id="defSummaryBar"></span></div>
      </div>
    </div>

    <div class="track hp">
      <div class="track-head">
        <div class="track-name"><span class="dot"></span>HP サイズ</div>
        <div class="track-count" id="hpTrackCount">0 / 12 解放</div>
      </div>
      <div class="track-grid" id="hpTrack"></div>
    </div>

    <div class="track atk">
      <div class="track-head">
        <div class="track-name"><span class="dot"></span>ATK 形状</div>
        <div class="track-count" id="atkTrackCount">0 / 12 解放</div>
      </div>
      <div class="track-grid" id="atkTrack"></div>
    </div>

    <div class="track def">
      <div class="track-head">
        <div class="track-name"><span class="dot"></span>DEF 素材</div>
        <div class="track-count" id="defTrackCount">0 / 12 解放</div>
      </div>
      <div class="track-grid" id="defTrack"></div>
    </div>
  </div>

  <div class="game-screen" id="gameScreen" hidden>

    <h1>combrawl</h1>

    <div class="hud">
      <div>ラウンド <b id="round">1</b></div>
      <div>所持カード <b id="cardCount">0</b></div>
    </div>
    <div class="hud hud-secondary">
      <div>1ターン最大ダメージ <b id="maxTurnDamage">0</b></div>
      <div>1ターン最大キル数 <b id="maxTurnKills">0</b></div>
      <div>自己ベスト到達ラウンド <b id="bestRound">-</b></div>
      <div>HIGH SCORE <b id="highScore">0</b></div>
    </div>

    <div class="score-display">
      <div class="score-number" id="scoreNum">SCORE 0</div>
    </div>

    <div class="endless-controls" id="endlessControls" hidden>
      <button class="btn secondary" id="switchFastBtn">高速に切替</button>
      <button class="btn secondary" id="switchUltraBtn">超速に切替</button>
      <button class="btn secondary" id="finishEndlessBtn">ここで終了</button>
    </div>

    <div class="arena" id="arena">
      <div class="side player" id="playerSide"></div>
      <div class="vs-divider"></div>
      <div class="side enemy" id="enemySide"></div>
    </div>

    <div class="status-line" id="statusLine">戦闘開始を押してください</div>

    <div id="cardArea"></div>

    <div style="display:flex; gap:10px; margin-top: 4px;">
      <button class="btn" id="startBtn">戦闘開始</button>
      <button class="btn secondary" id="resetBtn">最初から</button>
    </div>

    <div class="deck-strip" id="deckStrip"></div>
  </div>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>
</body>
</html>
