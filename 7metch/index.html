<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>ナナメッチ — 斜めマッチパズル</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <h1>ナナメッチ</h1>
      <div id="stage-info"></div>
    </header>

    <div id="screen-title" class="screen active">
      <div class="title-logo"><span class="t-accent">ナナメ</span><span class="t-accent2">ッチ</span></div>
      <p class="title-sub"><span class="t-accent">ナナメ</span>に動かせる3<span class="t-accent">マッチ</span>パズル</p>
      <button id="btn-start" class="btn-primary">はじめる</button>
      <button id="btn-stage-select" class="btn-secondary">ステージ選択</button>
      <div id="version-info">v0.8.0</div>
    </div>

    <div id="debug-panel" class="hidden">
      <div id="debug-content">
        <h3>🔧 デバッグモード</h3>
        <div class="debug-section">
          <label>ステージジャンプ</label>
          <div class="debug-row">
            <input type="number" id="debug-stage-num" min="1" max="50" value="1" />
            <button id="btn-debug-jump" class="btn-debug">GO</button>
          </div>
        </div>
        <div class="debug-section">
          <button id="btn-debug-unlock-all" class="btn-debug wide">全ステージ解放</button>
        </div>
        <div class="debug-section">
          <button id="btn-debug-reset" class="btn-debug wide danger">セーブデータリセット</button>
        </div>
        <button id="btn-debug-close" class="btn-secondary wide">とじる</button>
      </div>
    </div>

    <div id="update-toast" class="hidden">
      新しいバージョンがあります
      <button id="btn-update">更新する</button>
    </div>

    <div id="screen-stage-select" class="screen">
      <h2>ステージ選択</h2>
      <div id="stage-grid"></div>
      <button id="btn-back-title" class="btn-secondary">もどる</button>
    </div>

    <div id="screen-game" class="screen">
      <div id="game-hud">
        <div id="hud-left">
          <div id="hud-stage"></div>
          <div id="hud-moves"></div>
          <div id="hud-stars"></div>
        </div>
        <div id="hud-mission">
          <div id="hud-mission-label"></div>
          <div id="hud-mission-progress"></div>
        </div>
      </div>
      <canvas id="game-canvas"></canvas>
      <div id="game-buttons">
        <button id="btn-retry" class="btn-secondary">リトライ</button>
        <button id="btn-quit" class="btn-secondary">やめる</button>
      </div>
    </div>

    <div id="screen-result" class="screen">
      <div id="result-content">
        <h2 id="result-title"></h2>
        <div id="result-stars"></div>
        <div id="result-details"></div>
        <div id="result-buttons">
          <button id="btn-next" class="btn-primary">次のステージ</button>
          <button id="btn-result-retry" class="btn-secondary">リトライ</button>
          <button id="btn-result-stages" class="btn-secondary">ステージ選択</button>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").then((reg) => {
        reg.addEventListener("updatefound", () => {
          const newSW = reg.installing;
          newSW.addEventListener("statechange", () => {
            if (newSW.state === "activated" && navigator.serviceWorker.controller) {
              const toast = document.getElementById("update-toast");
              toast.classList.remove("hidden");
              document.getElementById("btn-update").addEventListener("click", () => {
                location.reload();
              });
            }
          });
        });
      });
    }
  </script>
</body>
</html>
