<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>狩りカンペ - MHWilds</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- セレクター画面 -->
    <div id="selector-screen" class="screen active">
      <header>
        <h1>狩りカンペ</h1>
        <p class="subtitle">MHWilds 武器カンペ｜非公式ファンツール</p>
      </header>
      <div class="selector-group">
        <label for="weapon-select">武器種</label>
        <select id="weapon-select"><option value="">— 選択 —</option></select>
      </div>
      <div class="selector-group">
        <label for="monster-select">モンスター</label>
        <select id="monster-select"><option value="">— 選択 —</option></select>
      </div>
      <div class="mode-buttons">
        <button id="btn-quest" class="btn btn-primary" disabled>クエスト中モード</button>
        <button id="btn-prep" class="btn btn-secondary" disabled>出発前モード</button>
      </div>
    </div>

    <!-- クエスト中モード -->
    <div id="quest-screen" class="screen">
      <header class="compact-header">
        <button class="btn-back" id="btn-back-quest">←</button>
        <div class="header-info">
          <span id="quest-weapon-name" class="header-weapon"></span>
          <span class="header-sep">vs</span>
          <span id="quest-monster-name" class="header-monster"></span>
        </div>
        <button class="btn-switch" id="btn-to-prep">出発前</button>
      </header>
      <div class="content">
        <!-- 1. 基本戦法 -->
        <section class="card" id="tactics-section">
          <h2 id="tactics-title">基本戦法</h2>
          <ol id="tactics-list"></ol>
        </section>
        <!-- 2. 注意点 -->
        <section class="card" id="cautions-section">
          <h2 id="cautions-title">注意点</h2>
          <ul id="cautions-list"></ul>
        </section>
        <!-- 3. 補足情報 -->
        <section class="card" id="extra-section">
          <h2>補足情報</h2>
          <div id="hitzone-table-wrapper"></div>
          <div id="weapon-extra"></div>
        </section>
      </div>
    </div>

    <!-- 出発前モード -->
    <div id="prep-screen" class="screen">
      <header class="compact-header">
        <button class="btn-back" id="btn-back-prep">←</button>
        <div class="header-info">
          <span id="prep-monster-name" class="header-monster"></span>
          <span class="header-sep">×</span>
          <span id="prep-weapon-name" class="header-weapon"></span>
        </div>
        <button class="btn-switch" id="btn-to-quest">クエスト中</button>
      </header>
      <div class="content">
        <section class="card">
          <h2>属性弱点</h2>
          <div id="element-weakness"></div>
        </section>
        <section class="card">
          <h2 id="countermeasure-title">対策スキル</h2>
          <div id="countermeasure-skills"></div>
        </section>
        <section class="card">
          <h2 id="attack-skills-title">汎用攻撃スキル</h2>
          <div id="attack-skills"></div>
        </section>
        <section class="card">
          <h2 id="utility-skills-title">あると便利なスキル</h2>
          <div id="utility-skills"></div>
        </section>
        <section class="card" id="mantle-section">
          <h2 id="mantle-title">装衣</h2>
          <div id="mantle-info"></div>
        </section>
        <section class="card">
          <h2>罠・アイテム情報</h2>
          <div id="trap-info"></div>
        </section>
        <section class="card">
          <h2>メモ</h2>
          <p id="prep-notes"></p>
        </section>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>
</body>
</html>
