<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Honeypaw Lab.</title>
  <meta name="description" content="Honeypaw Lab. — 欲しいものを、作りたいように作る">
  <meta name="theme-color" content="#FFF8E7">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #FFF8E7;
      color: #3D2B1F;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 24px 48px;
    }

    .logo {
      width: min(400px, 80vw);
      height: auto;
    }

    .motto {
      margin-top: 16px;
      font-size: 14px;
      font-weight: 700;
      color: #C68A17;
      letter-spacing: 0.5px;
    }

    .apps {
      width: 100%;
      max-width: 480px;
      padding: 0 24px;
    }

    .apps h2 {
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #C68A17;
      margin-bottom: 16px;
    }

    .app-card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: #FFFFFF;
      border-radius: 16px;
      padding: 16px;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 2px 8px rgba(61, 43, 31, 0.08);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .app-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(61, 43, 31, 0.12);
    }

    .app-icon {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      flex-shrink: 0;
    }

    .app-info h3 {
      font-size: 18px;
      font-weight: 800;
    }

    .app-info p {
      font-size: 13px;
      color: #7A6555;
      margin-top: 2px;
    }

    .badge {
      display: inline-block;
      margin-top: 6px;
      font-size: 11px;
      font-weight: 800;
      color: #FFFFFF;
      background: #F5C842;
      padding: 2px 8px;
      border-radius: 6px;
    }

    footer {
      margin-top: auto;
      padding: 48px 24px 24px;
      font-size: 12px;
      color: #C68A17;
    }
  </style>
</head>
<body>
  <div class="hero">
    <img src="logo.svg" alt="Honeypaw Lab." class="logo">
    <p class="motto">欲しいものを、作りたいように作る</p>
  </div>

  <div class="apps">
    <h2>Apps</h2>
    <a href="/7metch/" class="app-card">
      <img src="/7metch/icon-192.png" alt="ナナメッチ" class="app-icon">
      <div class="app-info">
        <h3>ナナメッチ</h3>
        <p>斜めに動かせる、じっくりマッチパズル</p>
        <span class="badge">Free</span>
      </div>
    </a>
    <a href="/emoji-dm/" class="app-card" style="margin-top: 12px;">
      <img src="/emoji-dm/icon-192.png" alt="emojidm" class="app-icon">
      <div class="app-info">
        <h3>emojidm</h3>
        <p>絵文字だけで、伝わる。</p>
        <span class="badge">Free</span>
      </div>
    </a>
    <a href="/enblo-classic/" class="app-card" style="margin-top: 12px;">
      <img src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2316131a'/><text y='.9em' font-size='80' x='10'>⚔️</text></svg>" alt="Endless Bloodline Classic" class="app-icon">
      <div class="app-info">
        <h3>Endless Bloodline Classic</h3>
        <p>死ぬまで戦う、自動戦闘ローグライク闘技場</p>
        <span class="badge">Free</span>
      </div>
    </a>
    <a href="/lifelog/" class="app-card" style="margin-top: 12px;">
      <img src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236366f1'/><text y='.9em' font-size='80' x='10'>📔</text></svg>" alt="LifeLog" class="app-icon">
      <div class="app-info">
        <h3>LifeLog</h3>
        <p>日々の記録とライフコーチ</p>
        <span class="badge">Free</span>
      </div>
    </a>
  </div>

  <footer>&copy; Honeypaw Lab.</footer>
</body>
</html>
