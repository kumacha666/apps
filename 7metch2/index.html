<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ナナメッチャ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a2e;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      width: 100vw;
    }
    canvas { display: block; }

    /* HUD */
    #hud {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 8px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 100%);
      z-index: 10;
    }
    #hud-stage { font-weight: bold; color: #ffd700; }
    #hud-score { color: #4ecdc4; }
    #hud-moves { color: #ff8a5c; }

    /* Screens */
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      transition: opacity 0.3s;
    }
    .screen.hidden { display: none; }

    /* Title */
    #title-screen {
      background: radial-gradient(ellipse at center, #1a1a4e 0%, #0a0a2e 100%);
    }
    #title-screen h1 {
      font-size: 48px;
      color: #ffd700;
      text-shadow: 0 0 20px rgba(255,215,0,0.5);
      margin-bottom: 8px;
    }
    #title-screen .subtitle {
      font-size: 16px;
      color: #888;
      margin-bottom: 40px;
    }
    .btn {
      padding: 14px 40px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.1s;
    }
    .btn:active { transform: scale(0.95); }
    .btn-primary {
      background: linear-gradient(135deg, #e94560, #ff8a5c);
      color: #fff;
    }

    /* Upgrade screen */
    #upgrade-screen {
      background: rgba(0,0,0,0.85);
    }
    #upgrade-screen h2 {
      font-size: 28px;
      color: #ffd700;
      margin-bottom: 24px;
    }
    .upgrade-cards {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 400px;
    }
    .upgrade-card {
      background: linear-gradient(135deg, #1a1a4e, #2a2a6e);
      border: 2px solid #444;
      border-radius: 12px;
      padding: 16px;
      width: 120px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.1s;
    }
    .upgrade-card:hover { border-color: #ffd700; transform: translateY(-4px); }
    .upgrade-card .icon { font-size: 32px; margin-bottom: 8px; }
    .upgrade-card .name { font-size: 13px; font-weight: bold; color: #fff; margin-bottom: 4px; }
    .upgrade-card .desc { font-size: 11px; color: #aaa; }
    .upgrade-card.rarity-common { border-color: #555; }
    .upgrade-card.rarity-rare { border-color: #4ecdc4; }
    .upgrade-card.rarity-epic { border-color: #c77dff; }
    .upgrade-card.rarity-legendary { border-color: #ffd700; }

    /* Game Over */
    #gameover-screen {
      background: rgba(0,0,0,0.85);
    }
    #gameover-screen h2 {
      font-size: 32px;
      color: #e94560;
      margin-bottom: 16px;
    }
    #gameover-stats {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 24px;
      text-align: center;
      line-height: 1.8;
    }

    /* Stage clear */
    #stageclear-screen {
      background: rgba(0,0,0,0.75);
    }
    #stageclear-screen h2 {
      font-size: 32px;
      color: #4ecdc4;
      margin-bottom: 8px;
    }
    #stageclear-info {
      color: #aaa;
      margin-bottom: 16px;
    }

    /* Upgrades list in HUD */
    #upgrade-list {
      position: absolute;
      bottom: 4px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 4px;
      flex-wrap: wrap;
      padding: 0 8px;
      z-index: 10;
    }
    .upgrade-badge {
      font-size: 16px;
      background: rgba(0,0,0,0.5);
      border-radius: 6px;
      padding: 2px 4px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="hud" class="hidden">
      <span id="hud-stage">Stage 1</span>
      <span id="hud-score">0点</span>
      <span id="hud-moves">20手</span>
    </div>

    <canvas id="game-canvas"></canvas>

    <div id="upgrade-list" class="hidden"></div>

    <!-- Title Screen -->
    <div id="title-screen" class="screen">
      <h1>ナナメッチャ</h1>
      <div class="subtitle">ぶっ壊れ3マッチローグライク</div>
      <button class="btn btn-primary" id="btn-start">はじめる</button>
    </div>

    <!-- Upgrade Screen -->
    <div id="upgrade-screen" class="screen hidden">
      <h2>アップグレード</h2>
      <div class="upgrade-cards" id="upgrade-cards"></div>
    </div>

    <!-- Stage Clear -->
    <div id="stageclear-screen" class="screen hidden">
      <h2>ステージクリア！</h2>
      <div id="stageclear-info"></div>
    </div>

    <!-- Game Over -->
    <div id="gameover-screen" class="screen hidden">
      <h2>ゲームオーバー</h2>
      <div id="gameover-stats"></div>
      <button class="btn btn-primary" id="btn-retry">もう1回</button>
    </div>
  </div>

  <script type="module" src="./game.js"></script>
</body>
</html>
