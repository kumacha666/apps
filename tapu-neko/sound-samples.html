<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ぷよネコ 効果音サンプル</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #ffeedd; padding: 20px; }
    h1 { color: #d4915a; margin-bottom: 20px; }
    .sound-card {
      background: white; border-radius: 16px; padding: 20px; margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .sound-card h2 { color: #d4915a; font-size: 18px; margin-bottom: 4px; }
    .sound-card p { color: #888; font-size: 14px; margin-bottom: 12px; }
    button {
      background: #f0a860; color: white; border: none; border-radius: 12px;
      padding: 12px 24px; font-size: 16px; font-weight: bold; cursor: pointer;
      margin-right: 8px; margin-bottom: 8px;
    }
    button:active { background: #d4915a; }
    .variant { background: #e8c89a; font-size: 14px; padding: 10px 18px; }
  </style>
</head>
<body>
  <h1>🐱 ぷよネコ 効果音サンプル</h1>

  <div class="sound-card">
    <h2>1. タッチ時（ぷにっ）</h2>
    <p>つついた瞬間の柔らかいへこみ音</p>
    <button onclick="puni1()">ぷにっ A（低め）</button>
    <button class="variant" onclick="puni2()">ぷにっ B（高め）</button>
    <button class="variant" onclick="puni3()">ぷにっ C（短め）</button>
  </div>

  <div class="sound-card">
    <h2>2. 引っ張り中（みょーん）</h2>
    <p>伸びている間の持続音（1.5秒再生）</p>
    <button onclick="myoon1()">みょーん A（上昇）</button>
    <button class="variant" onclick="myoon2()">みょーん B（ゴム的）</button>
  </div>

  <div class="sound-card">
    <h2>3. 離した時（ぽよん）</h2>
    <p>弾んで戻るバウンス音</p>
    <button onclick="poyon1()">ぽよん A（弾む）</button>
    <button class="variant" onclick="poyon2()">ぽよん B（低め）</button>
    <button class="variant" onclick="poyon3()">ぽよん C（軽め）</button>
  </div>

  <div class="sound-card">
    <h2>4. ピンチ広げ（ぷわぁ）</h2>
    <p>2本指で広げたときの膨張音</p>
    <button onclick="puwa()">ぷわぁ</button>
  </div>

  <div class="sound-card">
    <h2>5. ピンチ縮め（きゅっ）</h2>
    <p>2本指で縮めたときの圧縮音</p>
    <button onclick="kyu()">きゅっ</button>
  </div>

<script>
let actx;
function ctx() {
  if (!actx) actx = new AudioContext();
  return actx;
}

// === 1. タッチ（ぷにっ） ===

function puni1() {
  const c = ctx(), t = c.currentTime;
  const o = c.createOscillator();
  const g = c.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(280, t);
  o.frequency.exponentialRampToValueAtTime(120, t + 0.12);
  g.gain.setValueAtTime(0.35, t);
  g.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
  o.connect(g); g.connect(c.destination);
  o.start(t); o.stop(t + 0.15);
}

function puni2() {
  const c = ctx(), t = c.currentTime;
  const o = c.createOscillator();
  const g = c.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(450, t);
  o.frequency.exponentialRampToValueAtTime(200, t + 0.1);
  g.gain.setValueAtTime(0.3, t);
  g.gain.exponentialRampToValueAtTime(0.01, t + 0.12);
  o.connect(g); g.connect(c.destination);
  o.start(t); o.stop(t + 0.12);
}

function puni3() {
  const c = ctx(), t = c.currentTime;
  const o = c.createOscillator();
  const g = c.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(350, t);
  o.frequency.exponentialRampToValueAtTime(150, t + 0.06);
  g.gain.setValueAtTime(0.3, t);
  g.gain.exponentialRampToValueAtTime(0.01, t + 0.08);
  o.connect(g); g.connect(c.destination);
  o.start(t); o.stop(t + 0.08);
}

// === 2. 引っ張り中（みょーん） ===

function myoon1() {
  const c = ctx(), t = c.currentTime;
  const o = c.createOscillator();
  const g = c.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(150, t);
  o.frequency.exponentialRampToValueAtTime(600, t + 1.2);
  o.frequency.exponentialRampToValueAtTime(400, t + 1.5);
  g.gain.setValueAtTime(0.2, t);
  g.gain.setValueAtTime(0.2, t + 1.0);
  g.gain.exponentialRampToValueAtTime(0.01, t + 1.5);
  o.connect(g); g.connect(c.destination);
  o.start(t); o.stop(t + 1.5);
}

function myoon2() {
  const c = ctx(), t = c.currentTime;
  const o = c.createOscillator();
  const o2 = c.createOscillator();
  const g = c.createGain();
  o.type = 'sine';
  o2.type = 'sine';
  o.frequency.setValueAtTime(120, t);
  o.frequency.exponentialRampToValueAtTime(350, t + 1.5);
  o2.frequency.setValueAtTime(125, t);
  o2.frequency.exponentialRampToValueAtTime(355, t + 1.5);
  g.gain.setValueAtTime(0.15, t);
  g.gain.setValueAtTime(0.15, t + 1.0);
  g.gain.exponentialRampToValueAtTime(0.01, t + 1.5);
  o.connect(g); o2.connect(g); g.connect(c.destination);
  o.start(t); o.stop(t + 1.5);
  o2.start(t); o2.stop(t + 1.5);
}

// === 3. 離した時（ぽよん） ===

function poyon1() {
  const c = ctx(), t = c.currentTime;
  const o = c.createOscillator();
  const g = c.createGain();
  o.type = 'sine';
  // Bounce: high→low→mid→low
  o.frequency.setValueAtTime(500, t);
  o.frequency.exponentialRampToValueAtTime(150, t + 0.08);
  o.frequency.exponentialRampToValueAtTime(350, t + 0.15);
  o.frequency.exponentialRampToValueAtTime(120, t + 0.25);
  o.frequency.exponentialRampToValueAtTime(250, t + 0.3);
  o.frequency.exponentialRampToValueAtTime(100, t + 0.4);
  g.gain.setValueAtTime(0.35, t);
  g.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
  o.connect(g); g.connect(c.destination);
  o.start(t); o.stop(t + 0.4);
}

function poyon2() {
  const c = ctx(), t = c.currentTime;
  const o = c.createOscillator();
  const g = c.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(350, t);
  o.frequency.exponentialRampToValueAtTime(100, t + 0.1);
  o.frequency.exponentialRampToValueAtTime(220, t + 0.18);
  o.frequency.exponentialRampToValueAtTime(80, t + 0.35);
  g.gain.setValueAtTime(0.35, t);
  g.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
  o.connect(g); g.connect(c.destination);
  o.start(t); o.stop(t + 0.4);
}

function poyon3() {
  const c = ctx(), t = c.currentTime;
  const o = c.createOscillator();
  const g = c.createGain();
  o.type = 'triangle';
  o.frequency.setValueAtTime(600, t);
  o.frequency.exponentialRampToValueAtTime(200, t + 0.06);
  o.frequency.exponentialRampToValueAtTime(400, t + 0.12);
  o.frequency.exponentialRampToValueAtTime(180, t + 0.22);
  g.gain.setValueAtTime(0.25, t);
  g.gain.exponentialRampToValueAtTime(0.01, t + 0.25);
  o.connect(g); g.connect(c.destination);
  o.start(t); o.stop(t + 0.25);
}

// === 4. ピンチ広げ（ぷわぁ） ===

function puwa() {
  const c = ctx(), t = c.currentTime;
  const o = c.createOscillator();
  const g = c.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(180, t);
  o.frequency.exponentialRampToValueAtTime(400, t + 0.3);
  o.frequency.exponentialRampToValueAtTime(250, t + 0.5);
  g.gain.setValueAtTime(0.25, t);
  g.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
  o.connect(g); g.connect(c.destination);
  o.start(t); o.stop(t + 0.5);
}

// === 5. ピンチ縮め（きゅっ） ===

function kyu() {
  const c = ctx(), t = c.currentTime;
  const o = c.createOscillator();
  const g = c.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(500, t);
  o.frequency.exponentialRampToValueAtTime(150, t + 0.08);
  g.gain.setValueAtTime(0.3, t);
  g.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
  o.connect(g); g.connect(c.destination);
  o.start(t); o.stop(t + 0.1);
}
</script>
</body>
</html>
